  <line x1="64" y1="64" x2="78" y2="64" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <circle cx="64" cy="64" r="3" fill="#6EE7B7"/>
  <!-- Gear teeth -->
  <line x1="64" y1="30" x2="64" y2="36" stroke="#6EE7B7" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="64" y1="92" x2="64" y2="98" stroke="#6EE7B7" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="30" y1="64" x2="36" y2="64" stroke="#6EE7B7" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="92" y1="64" x2="98" y2="64" stroke="#6EE7B7" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
</svg>
