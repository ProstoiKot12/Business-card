<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="ai-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="ai-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="112" height="112" rx="22" fill="url(#ai-bg)"/>
  <!-- Chip body -->
  <rect x="32" y="32" width="64" height="64" rx="8" fill="none" stroke="#fff" stroke-width="3" opacity="0.9"/>
  <!-- Chip pins - top -->
  <line x1="48" y1="20" x2="48" y2="32" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="64" y1="20" x2="64" y2="32" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="80" y1="20" x2="80" y2="32" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Chip pins - bottom -->
  <line x1="48" y1="96" x2="48" y2="108" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="64" y1="96" x2="64" y2="108" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="80" y1="96" x2="80" y2="108" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Chip pins - left -->
  <line x1="20" y1="48" x2="32" y2="48" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="20" y1="64" x2="32" y2="64" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="20" y1="80" x2="32" y2="80" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Chip pins - right -->
  <line x1="96" y1="48" x2="108" y2="48" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="96" y1="64" x2="108" y2="64" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="96" y1="80" x2="108" y2="80" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Neural network: layer 1 (input) -->
  <circle cx="46" cy="48" r="4" fill="url(#ai-glow)"/>
  <circle cx="46" cy="64" r="4" fill="url(#ai-glow)"/>
  <circle cx="46" cy="80" r="4" fill="url(#ai-glow)"/>
  <!-- Neural network: layer 2 (hidden) -->
  <circle cx="64" cy="52" r="4.5" fill="#fff" opacity="0.95"/>
  <circle cx="64" cy="76" r="4.5" fill="#fff" opacity="0.95"/>
  <!-- Neural network: layer 3 (output) -->
  <circle cx="82" cy="56" r="5" fill="#fff"/>
  <circle cx="82" cy="72" r="5" fill="#fff"/>
  <!-- Connections: input → hidden -->
  <line x1="50" y1="48" x2="60" y2="52" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="48" x2="60" y2="76" stroke="#A78BFA" stroke-width="1" opacity="0.35"/>
  <line x1="50" y1="64" x2="60" y2="52" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="64" x2="60" y2="76" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="80" x2="60" y2="52" stroke="#A78BFA" stroke-width="1" opacity="0.35"/>
  <line x1="50" y1="80" x2="60" y2="76" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
  <!-- Connections: hidden → output -->
  <line x1="68.5" y1="52" x2="77" y2="56" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
  <line x1="68.5" y1="52" x2="77" y2="72" stroke="#A78BFA" stroke-width="1" opacity="0.4"/>
  <line x1="68.5" y1="76" x2="77" y2="56" stroke="#A78BFA" stroke-width="1" opacity="0.4"/>
  <line x1="68.5" y1="76" x2="77" y2="72" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
</svg>