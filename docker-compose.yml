services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: business_card_bot
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  bot:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bot:bot@postgres:5432/business_card_bot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    command: sh -c "alembic upgrade head && exec python -m app.main"
    ports:
      - "8000:8000"

volumes:
  postgres_data:
